<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tests</title>
    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=VT323&display=swap" rel="stylesheet">
</head>

<body>
    <div class="formulario">
        <h1>FORMULARIO DE DATOS</h1>
        <hr class="linea">
        <div class="nombres">
            <div>
                <label>Nombre:</label>
                <input type="text" placeholder="Nombre">
            </div>        
                
            <div>
                <label>Apellido:</label>
                <input type="text" placeholder="Apellido">
            </div>
        </div>

        <label>Genero</label>
        <select>
            <option value="">--SELECCIONE--</option>
            <option>Masculino</option>
            <option>Femenino</option>
            <option>Prefiero no decirlo</option>
        </select>

        <label>FECHA DE NACIMIENTO</label>
        <input type="date" name="fecha_nac">

        <label>CARRERA</label>
        <select>
            <option value="">--SELECCIONE--</option>
            <option>Ingeniería en Mecatrónica</option>
            <option>Ingeniería en Logística Internacional</option>
            <option>Ingeniería en Mantenimiento Industrial</option>
            <option>Ingeniería en Energías y Desarrollo Sostenible</option>
            <option>TI</option>
            <option>Licenciatura en Negocios y Mercadotecnia</option>
            <option>Licenciatura en Educación</option>
            <option>Ingeniería Industrial</option>
            <option>Licenciatura en Diseño Digital y Producción Audiovisual</option>
            <option>Licenciatura en Comercio Internacional y Aduanas</option>
        </select>
        <hr class="linea">

        <label>Uso del telefono</label>
        <select>
            <option value="">--SELECCIONE--</option>
            <option>1 hora o menos</option>
            <option>1-3 horas</option>
            <option>3-5 horas</option>
            <option>5-7 horas</option>
            <option>7 horas o más</option>
        </select>

        <label>Aplicaciones en las que pasa mas tiempo o le quita tiempo</label>
        <select>
            <option value="">--SELECCIONE--</option>
            <option>Facebook</option>
            <option>Instagram</option>
            <option>Twitter</option>
            <option>YouTube</option>
            <option>twitch</option>
            <option>Discord</option>
            <option>WhatsApp</option>
            <option value="otras">Otras</option>
        </select>




        <button  class="continuar" >CONTINUAR</button>
    </div>

   <div class="tests">
        <details>
            <summary>Test STROOP</summary>
            <div class="test">
                <div id="test-view">
                    <div class="header">
                        <div class="meta">
                            <div class="timer">02:30</div>
                            <div>Fase: <span id="item-num">1</span>/<span id="item-total">24</span></div>
                        </div>
                    </div>
                    <div class="progreso">
                        <div class="progress">
                            <span>PROGRESO</span>
                            <span id="porc">0%</span>
                        </div>
                        <div class="barra_progreso"><div class="llenado_barrra" id="prog"></div></div>
                    </div>

                    <div class="estimulo">
                        <span class="est">cargando...</span>
                    </div>

                    <div class="colors">
                        <button class="color-btn" onclick="answer('rojo')">ROJO</button>
                        <button class="color-btn" onclick="answer('verde')">VERDE</button>
                        <button class="color-btn" onclick="answer('azul')">AZUL</button>
                        <button class="color-btn" onclick="answer('amarillo')">AMARILLO</button>
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-label">ACIERTOS</span>
                            <span class="stat-value v-green" id="s-aciertos">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">ERRORES</span>
                            <span class="stat-value v-red" id="s-errores">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">RT PROM.</span>
                            <span class="stat-value v-violet" id="s-rt">—</span>
                        </div>
                    </div>
                </div>
            </div>
        </details>

        <details>
            <summary>Test SART</summary>
            <div class="test">
                <div id="test-view">
                    <div class="header">
                        <div class="meta">
                            <div class="timer">05:00</div>
                            <div>Fase: <span id="item-num">1</span>/<span id="item-total">254</span></div>
                        </div>
                    </div>
                    <div class="estimulo">
                        <span class="est">cargando...</span>
                    </div>
                    <div class="progreso">
                        <div class="barra-iversa"></div>
                    </div>
                    <div class="btn-res">
                        <button class="res" onclick="answer('')">RESPONDER</button> 
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-label">ACIERTOS</span>
                            <span class="stat-value v-green" id="s-aciertos">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">ERRORES</span>
                            <span class="stat-value v-red" id="s-errores">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">RT PROM.</span>
                            <span class="stat-value v-violet" id="s-rt">—</span>
                        </div>
                    </div>
                </div>
            </div>
        </details>
 
        <details>
            <summary>Test N-BACK</summary>
            <div class="test">
                <div id="test-view">
                    <div class="header">
                        <div class="meta">
                            <div class="timer">05:00</div>
                            <div>Fase: <span id="item-num">1</span>/<span id="item-total">254</span></div>
                        </div>
                    </div>
                    <div class="estimulo">
                        <span class="est">cargando...</span>
                    </div>
                    <div class="progreso">
                        <div class="barra-iversa"></div>
                    </div>
                    <div class="btn-res">
                        <button class="res" onclick="answer('res')">COINCIDEN</button> 
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-label">ACIERTOS</span>
                            <span class="stat-value v-green" id="s-aciertos">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">ERRORES</span>
                            <span class="stat-value v-red" id="s-errores">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">RT PROM.</span>
                            <span class="stat-value v-violet" id="s-rt">—</span>
                        </div>
                    </div>
                </div>
            </div>
        </details>
    </div>
    <script src="../backend/stroop.js"></script>
    <script src="../backend/sart.js"></script>
    <script src="../backend/nback.js"></script>
    <script src="../backend/formulario.js"></script>
</body>
</html>
